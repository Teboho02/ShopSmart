name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore ShopSmart.slnx

      - name: Build
        run: dotnet build ShopSmart.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test ShopSmart.Tests/ShopSmart.Tests.csproj --no-build --configuration Release --verbosity normal
